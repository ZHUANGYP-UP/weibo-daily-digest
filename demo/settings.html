<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>大眼睛快搜内容 - 设置</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: {
        colors: {
          "on-surface": "#2c3437", "on-surface-variant": "#596064", "primary": "#b32c00",
          "primary-container": "#f35022", "on-primary": "#fff7f6", "on-primary-container": "#000000",
          "surface": "#f7f9fb", "surface-container": "#eaeff2", "surface-container-low": "#f0f4f7",
          "surface-container-high": "#e3e9ed", "surface-container-highest": "#dce4e8",
          "surface-container-lowest": "#ffffff", "surface-bright": "#f7f9fb", "background": "#f7f9fb",
          "outline-variant": "#acb3b7", "outline": "#747c80", "error": "#a83836",
          "secondary-container": "#d5e3fc", "on-secondary-container": "#455367", "secondary": "#526074",
        },
        fontFamily: { headline: ["Manrope"], body: ["Inter"], label: ["Inter"] },
      }},
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; min-height: max(884px, 100dvh); }
    h1, h2, h3, .brand-font { font-family: 'Manrope', 'Microsoft YaHei', sans-serif; }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-32">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-40 bg-white/80 backdrop-blur-md shadow-sm shadow-slate-200/40">
  <div class="flex items-center justify-between px-6 py-3 w-full">
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-[#b32c00]">auto_awesome</span>
      <span class="text-xl font-black text-[#b32c00] uppercase tracking-widest">大眼睛快搜内容</span>
    </div>
    <button class="p-2 rounded-full hover:bg-slate-50 transition-colors active:scale-95 duration-200">
      <span class="material-symbols-outlined text-slate-500">notifications</span>
    </button>
  </div>
</header>

<main class="pt-20 px-6 max-w-2xl mx-auto space-y-8">
  <!-- Success Toast -->
  <div id="successToast" class="hidden bg-secondary-container/30 border border-secondary-container p-4 rounded-xl flex items-center gap-3 transition-all">
    <span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
    <p class="text-on-secondary-container font-medium text-sm">设置已成功保存</p>
  </div>

  <section class="space-y-6">
    <h2 class="text-2xl font-extrabold text-on-surface tracking-tight" style="font-family:'Manrope'">配置选项</h2>

    <!-- Push Notifications -->
    <div class="bg-surface-container-lowest rounded-xl p-8 space-y-6">
      <div class="flex items-center justify-between">
        <div class="space-y-1">
          <h3 class="font-bold text-lg" style="font-family:'Manrope'">推送通知</h3>
          <p class="text-on-surface-variant text-sm">管理接收情报更新的时间。</p>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
          <input id="pushToggle" checked type="checkbox" class="sr-only peer"/>
          <div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-surface-container-lowest after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
        </label>
      </div>
      <div class="space-y-4">
        <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">每日推送时间</label>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-surface-container-high p-4 rounded-xl flex flex-col items-center justify-center space-y-2 border border-transparent focus-within:bg-surface-container-lowest focus-within:border-primary/30 transition-all cursor-pointer" onclick="adjustTime('hour', 1)">
            <span id="hourDisplay" class="text-3xl font-extrabold" style="font-family:'Manrope'">08</span>
            <span class="text-[10px] font-bold uppercase text-on-surface-variant">时</span>
          </div>
          <div class="bg-surface-container-high p-4 rounded-xl flex flex-col items-center justify-center space-y-2 border border-transparent focus-within:bg-surface-container-lowest focus-within:border-primary/30 transition-all cursor-pointer" onclick="adjustTime('minute', 15)">
            <span id="minuteDisplay" class="text-3xl font-extrabold" style="font-family:'Manrope'">00</span>
            <span class="text-[10px] font-bold uppercase text-on-surface-variant">分</span>
          </div>
        </div>
      </div>
    </div>

    <!-- AI Style Selection -->
    <div class="bg-surface-container-lowest rounded-xl p-8 space-y-6">
      <div class="space-y-1">
        <h3 class="font-bold text-lg" style="font-family:'Manrope'">AI 生成风格</h3>
        <p class="text-on-surface-variant text-sm">选择为您生成的摘要深度。</p>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <label class="cursor-pointer group" onclick="selectStyle('concise')">
          <input checked class="hidden peer" name="ai-style" type="radio" value="concise"/>
          <div id="style-concise" class="p-5 rounded-xl border border-primary/30 bg-white shadow-sm transition-all h-full">
            <div class="flex justify-between items-start mb-3">
              <span class="material-symbols-outlined text-on-surface-variant">short_text</span>
              <div class="w-4 h-4 rounded-full border-2 border-primary bg-primary flex items-center justify-center">
                <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
              </div>
            </div>
            <h4 class="font-bold text-on-surface mb-1">精简摘要</h4>
            <p class="text-xs text-on-surface-variant leading-relaxed">核心亮点与快速要点，阅读时间少于 2 分钟。</p>
          </div>
        </label>
        <label class="cursor-pointer group" onclick="selectStyle('detailed')">
          <input class="hidden peer" name="ai-style" type="radio" value="detailed"/>
          <div id="style-detailed" class="p-5 rounded-xl border border-transparent bg-surface-container-high transition-all h-full">
            <div class="flex justify-between items-start mb-3">
              <span class="material-symbols-outlined text-on-surface-variant">article</span>
              <div class="w-4 h-4 rounded-full border-2 border-outline-variant flex items-center justify-center"></div>
            </div>
            <h4 class="font-bold text-on-surface mb-1">深度分析</h4>
            <p class="text-xs text-on-surface-variant leading-relaxed">深入的背景信息、来源对比及全面的见解。</p>
          </div>
        </label>
      </div>
    </div>

    <!-- Save Button -->
    <div class="pt-4">
      <button onclick="saveSettings()" class="w-full bg-gradient-to-b from-primary to-primary-container text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/10 active:scale-[0.98] transition-transform uppercase tracking-widest text-sm">保存更改</button>
    </div>
  </section>

  <!-- Danger Zone -->
  <div class="p-8 border-2 border-dashed border-outline-variant/20 rounded-xl flex items-center justify-between opacity-60 grayscale hover:grayscale-0 transition-all">
    <div>
      <h4 class="font-bold text-on-surface">重置数据</h4>
      <p class="text-xs text-on-surface-variant">清除所有历史记录和个性化设置。</p>
    </div>
    <button onclick="resetData()" class="text-error font-bold text-xs uppercase tracking-widest">全部清除</button>
  </div>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-50 border-t border-slate-100">
  <a class="flex flex-col items-center justify-center text-slate-400 px-3 py-1 hover:text-[#f35022] transition-all active:scale-90" href="index.html">
    <span class="material-symbols-outlined">dashboard</span>
    <span class="text-[11px] font-semibold tracking-wide uppercase mt-1">首页</span>
  </a>
  <a class="flex flex-col items-center justify-center text-slate-400 px-3 py-1 hover:text-[#f35022] transition-all active:scale-90" href="bloggers.html">
    <span class="material-symbols-outlined">group</span>
    <span class="text-[11px] font-semibold tracking-wide uppercase mt-1">博主</span>
  </a>
  <a class="flex flex-col items-center justify-center text-slate-400 px-3 py-1 hover:text-[#f35022] transition-all active:scale-90" href="history.html">
    <span class="material-symbols-outlined">history</span>
    <span class="text-[11px] font-semibold tracking-wide uppercase mt-1">历史</span>
  </a>
  <a class="flex flex-col items-center justify-center text-[#b32c00] bg-slate-50 rounded-xl px-3 py-1 active:scale-90" href="settings.html">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
    <span class="text-[11px] font-semibold tracking-wide uppercase mt-1">设置</span>
  </a>
</nav>

<script>
let hour = parseInt(localStorage.getItem('pushHour') || '8');
let minute = parseInt(localStorage.getItem('pushMinute') || '0');
let currentStyle = localStorage.getItem('aiStyle') || 'concise';

function updateDisplay() {
  document.getElementById('hourDisplay').textContent = String(hour).padStart(2, '0');
  document.getElementById('minuteDisplay').textContent = String(minute).padStart(2, '0');
}

function adjustTime(type, step) {
  if (type === 'hour') {
    hour = (hour + step) % 24;
  } else {
    minute = (minute + step) % 60;
  }
  updateDisplay();
}

function selectStyle(style) {
  currentStyle = style;
  const concise = document.getElementById('style-concise');
  const detailed = document.getElementById('style-detailed');
  if (style === 'concise') {
    concise.className = 'p-5 rounded-xl border border-primary/30 bg-white shadow-sm transition-all h-full';
    concise.querySelector('.w-4').className = 'w-4 h-4 rounded-full border-2 border-primary bg-primary flex items-center justify-center';
    concise.querySelector('.w-4').innerHTML = '<div class="w-1.5 h-1.5 bg-white rounded-full"></div>';
    detailed.className = 'p-5 rounded-xl border border-transparent bg-surface-container-high transition-all h-full';
    detailed.querySelector('.w-4').className = 'w-4 h-4 rounded-full border-2 border-outline-variant flex items-center justify-center';
    detailed.querySelector('.w-4').innerHTML = '';
  } else {
    detailed.className = 'p-5 rounded-xl border border-primary/30 bg-white shadow-sm transition-all h-full';
    detailed.querySelector('.w-4').className = 'w-4 h-4 rounded-full border-2 border-primary bg-primary flex items-center justify-center';
    detailed.querySelector('.w-4').innerHTML = '<div class="w-1.5 h-1.5 bg-white rounded-full"></div>';
    concise.className = 'p-5 rounded-xl border border-transparent bg-surface-container-high transition-all h-full';
    concise.querySelector('.w-4').className = 'w-4 h-4 rounded-full border-2 border-outline-variant flex items-center justify-center';
    concise.querySelector('.w-4').innerHTML = '';
  }
}

function saveSettings() {
  localStorage.setItem('pushHour', hour);
  localStorage.setItem('pushMinute', minute);
  localStorage.setItem('aiStyle', currentStyle);
  const toast = document.getElementById('successToast');
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 3000);
}

function resetData() {
  if (confirm('确定要清除所有数据吗？此操作不可撤销。')) {
    localStorage.clear();
    location.reload();
  }
}

// Init
updateDisplay();
selectStyle(currentStyle);
</script>
</body>
</html>
